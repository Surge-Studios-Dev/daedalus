name: {{slug}}
description: "{{name}} - {{tagline}}"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.0
  # The shared Surge toolbox (Tier 2) and onboarding System (Tier 3). Two
  # modes, chosen at stamp time (use_git_deps): path for workspace dev where
  # apps sit as siblings of the Daedalus checkout, git for standalone repos /
  # CI, pinned to a ref. Drop other surge_* Systems in the same way.
{{#use_git_deps}}
  surge_core:
    git:
      url: {{{surge_git_url}}}
      ref: {{{surge_git_ref}}}
      path: packages/surge_core
  surge_ui:
    git:
      url: {{{surge_git_url}}}
      ref: {{{surge_git_ref}}}
      path: packages/surge_ui
  surge_onboarding:
    git:
      url: {{{surge_git_url}}}
      ref: {{{surge_git_ref}}}
      path: packages/surge_onboarding
  surge_rating:
    git:
      url: {{{surge_git_url}}}
      ref: {{{surge_git_ref}}}
      path: packages/surge_rating
  surge_crud:
    git:
      url: {{{surge_git_url}}}
      ref: {{{surge_git_ref}}}
      path: packages/surge_crud
  surge_share:
    git:
      url: {{{surge_git_url}}}
      ref: {{{surge_git_ref}}}
      path: packages/surge_share
{{/use_git_deps}}
{{^use_git_deps}}
  surge_core:
    path: {{{surge_core_path}}}
  surge_ui:
    path: {{{surge_ui_path}}}
  surge_onboarding:
    path: {{{surge_onboarding_path}}}
  surge_rating:
    path: {{{surge_rating_path}}}
  surge_crud:
    path: {{{surge_crud_path}}}
  surge_share:
    path: {{{surge_share_path}}}
{{/use_git_deps}}
  # Auth backend. The app depends on modules/auth/AuthService; these power the
  # FirebaseAuthService binding, selected in bootstrap once `flutterfire
  # configure` has run and useFirebase is flipped on. Apple/Google are always
  # present (the service imports them); the buttons are shown per auth.providers.
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  firebase_analytics: ^11.3.3
  firebase_crashlytics: ^4.1.4
  google_sign_in: ^6.2.1
  sign_in_with_apple: ^6.1.3
  # OAuth buttons render Google's canonical multi-color G inline
  # (modules/auth/oauth_buttons.dart) - provider-branded, never themed.
  flutter_svg: ^2.0.10
  # Purchases backend. The app depends on modules/paywall/PurchaseService; this
  # powers the RevenueCatPurchaseService binding, selected in bootstrap once the
  # RevenueCat app/entitlement/products exist and useRevenueCat is flipped on.
  purchases_flutter: ^8.1.0
  # Primary product analytics: one PostHog project per app (prod + dev), key
  # via --dart-define=POSTHOG_KEY. See ANALYTICS.md; recordings stay off.
  posthog_flutter: ^4.7.0
  # Local persistence for settings + the onboarding flag (always on).
  shared_preferences: ^2.3.2

  # SEAM: uncomment as you wire each further integration (see bootstrap.dart
  # and the SEAM: markers). The pattern screens run surge_crud in-memory; for
  # per-user cloud data, add cloud_firestore below and bind
  # FirestoreCrudRepository at users/{uid}/<tab> in bootstrap -
  # firestore.rules already isolates that path. If the free tier is metered
  # (INTAKE pass 3), add surge_meter (same source as surge_ui above) and
  # charge via consumeAllowance the moment the metered work succeeds. If
  # content is shared INTO the app (share sheet), add surge_import_queue +
  # the platform templates in templates/share_extension/.
  # cloud_firestore: ^5.4.4{{#remote_config}}
  # firebase_remote_config: ^5.1.3{{/remote_config}}

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.1
  flutter_native_splash: ^2.4.1
  # Screen-board harness: every screen -> light/dark PNGs + an HTML contact
  # sheet, headlessly (test/goldens/screen_board.dart). The agent's eyes.
  golden_board:
    git:
      url: https://github.com/Esagem/golden_board.git
      ref: v0.1.0

flutter:
  uses-material-design: true
