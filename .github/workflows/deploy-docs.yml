# Deploys the docs site (docs/ -> VitePress) to GitHub Pages.
#
# MANUAL trigger only (Actions tab -> Deploy docs -> Run workflow): Pages on a
# private repo needs a paid plan, so this never runs - or fails - on its own.
# One-time setup before the first run: repo Settings -> Pages -> Source =
# "GitHub Actions".
name: Deploy docs

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Build site
        working-directory: docs
        run: |
          npm ci
          npm run build -- --base /Daedalus/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
