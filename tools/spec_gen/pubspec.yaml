name: spec_gen
description: Scaffolds a product-spec skeleton (design/spec.md) from a surge.manifest.yaml, so humans write product intent, not document structure. Section layout mirrors templates/spec.template.md (test-enforced). Also ships spec_lint (unit tests for the spec's English) and the shared spec parser used by tools/spec_coverage.
version: 0.1.0
publish_to: none

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  yaml: ^3.1.2

dev_dependencies:
  test: ^1.25.0
  lints: ^5.0.0
